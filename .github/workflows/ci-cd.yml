name: CI/CD ceo proces

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  ci:
    name: Testiranje i build provere
    runs-on: ubuntu-latest

    steps:
      - name: Preuzmi repozitorijum
        uses: actions/checkout@v4

      - name: Podesi Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instaliraj frontend zavisnosti
        run: npm install

      - name: Pokreni frontend lint (ako postoji)
        run: npm run lint --if-present

      - name: Izgradi frontend
        run: npm run build --if-present

      - name: Pokreni frontend testove (ako postoje)
        run: npm run test --if-present

      - name: Instaliraj backend zavisnosti
        run: npm --prefix backend install

      - name: Pokreni backend testove (ako postoje)
        run: npm --prefix backend run test --if-present

      - name: Provera sintakse backend-a
        run: node --check backend/server.js

  docker:
    name: Izgradnja Dockera
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Preuzmi repozitorijum
        uses: actions/checkout@v4

      - name: Podesi Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prijava na GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Izgradi backend Docker sliku
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}-backend:latest

      - name: Izgradi frontend Docker sliku
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}-frontend:latest

  deploy:
    name: Opcioni deploy
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Pokreni deployment webhook
        if: env.DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ github.sha }}","repository":"${{ github.repository }}"}'
